<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f8a64"/>
      <stop offset="0.55" stop-color="#115644"/>
      <stop offset="1" stop-color="#0a2a2e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d6fff1"/>
      <stop offset="1" stop-color="#7fe9c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#3cc093" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#3cc093" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="18"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 圆角方块底 -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="220" fill="url(#glow)"/>
  <rect x="6" y="6" width="1012" height="1012" rx="214" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4"/>

  <!-- Claude 闪电：官方路径(48x46)，缩放成主视觉并居中偏上 -->
  <g transform="translate(232 168) scale(11.6)">
    <path fill="url(#bolt)" stroke="#0a2a2e" stroke-width="0.6" stroke-linejoin="round" d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"/>
  </g>

  <!-- 右下「中」字红印章，缩小为点缀角标 -->
  <g transform="translate(728 728)">
    <circle cx="100" cy="100" r="118" fill="#d9534a"/>
    <circle cx="100" cy="100" r="118" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="9"/>
    <text x="100" y="100"
      font-family="'Microsoft YaHei','PingFang SC','Source Han Sans',sans-serif"
      font-size="168" font-weight="900" fill="#ffffff"
      text-anchor="middle" dominant-baseline="central">中</text>
  </g>
</svg>
