name: 功能建议
description: 提出新功能或改进想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 这个功能要解决什么场景下的什么问题？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？可以描述交互或贴参考截图。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
